<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Framecast — real-time 2× player</title>
<style>
  body { font:14px/1.5 system-ui, sans-serif; margin:20px; max-width:1100px; background:#181818; color:#ddd; }
  button,select { font-size:15px; padding:5px 10px; margin-right:8px; }
  #stage { position:relative; margin-top:12px; max-width:1024px; }
  canvas { width:100%; background:#000; display:block; border-radius:6px; }
  #hud { position:absolute; top:8px; left:8px; font:13px/1.5 monospace; color:#0f0;
         background:rgba(0,0,0,.55); padding:6px 10px; border-radius:6px; white-space:pre; }
  #status { font:13px monospace; white-space:pre-wrap; color:#aaa; margin-top:8px; }
  .bad { color:#f66; }
  label { margin-right:12px; }
</style>
</head>
<body>
<h3>Framecast — real-time 2× player (worker edition)</h3>
<p>Весь пиксельный тракт — в отдельном потоке (Web Worker), модель принимает и отдаёт
сырые пиксели канваса (никаких JS-циклов). Реальное время: <b>webnn + 360p/480p</b>.</p>

<div>
  <input type="file" id="file" accept="video/*">
  <select id="ep"><option value="webnn">webnn (нужен флаг)</option><option value="webgpu">webgpu</option></select>
  <select id="res"><option value="auto">авто (макс качество+фпс)</option><option value="1080">1080p (вставки 480p)</option><option value="720">720p (вставки 480p)</option><option value="480">480p</option><option value="360">360p</option><option value="720f">720p честный (медленно)</option></select>
  <select id="quality"><option value="turbo">turbo (1blk)</option><option value="fastest">fastest (student)</option></select>
</div>
<div style="margin-top:8px">
  <button id="playBtn" disabled>Play</button>
  <button id="pauseBtn" disabled>Pause</button>
  <label><input type="checkbox" id="interpOn" checked> интерполяция 2×</label>
  <label><input type="checkbox" id="animeMode" checked> аниме-режим (дедуп «двоек»)</label>
  <label><input type="checkbox" id="mute"> без звука</label>
</div>

<div id="stage"><canvas id="out"></canvas><div id="hud">—</div></div>
<div id="status"></div>
<video id="vid" style="display:none" playsinline></video>

<script>
// disp = display/original size; comp = model size for the mids; f32res = fallback-map key.
// '720' shows sharp 720p originals but computes mids at 480p (upscaled on display) —
// a mid flashes for ~21ms between two sharp frames, the softness is invisible, and the
// 480p model fits the real-time budget where the honest 720p one does not.
const MODES = {
  'auto': { disp: null,         comp: null,        f32res: '480' }, // disp = video native (<=1080), worker walks the ladder
  '1080': { disp: [1920, 1080], comp: [854, 480],  f32res: '480' },
  '360':  { disp: [640, 360],  comp: [640, 360],  f32res: '360' },
  '480':  { disp: [854, 480],  comp: [854, 480],  f32res: '480' },
  '720':  { disp: [1280, 720], comp: [854, 480],  f32res: '480' },
  '720f': { disp: [1280, 720], comp: [1280, 720], f32res: '720' },
};
const DELAY_MS = 100; // pipeline delay (display queue + audio DelayNode)

const $ = id => document.getElementById(id);
const st = (m, bad) => { $('status').textContent += m + '\n'; if (bad) $('status').classList.add('bad'); };
const vid = $('vid'), out = $('out'), octx = out.getContext('2d');

let worker = null, workerKey = null;
let W = 0, H = 0;     // display size
let CW = 0, CH = 0;   // compute (model) size
let letterbox = null, lctx = null;   // display-size staging canvas (GPU draws only)
let letterboxC = null, lcctx = null; // compute-size staging canvas for the worker
let queue = [];   // {kind:'bmp'|'img', payload, at}
let prevBmp = null, prevTs = 0, intervalMs = 42;
let shown = 0, dropped = 0, dups = 0, interpMs = 0, halfRate = false, midCfg = '';
let hudTimer = 0, shownWindow = [], running = false;

let audioCtx = null, audioDelay = null;
function ensureAudioDelay() {
  if (audioCtx) return;
  audioCtx = new AudioContext();
  audioCtx.createMediaElementSource(vid).connect(
    (audioDelay = audioCtx.createDelay(1.0))).connect(audioCtx.destination);
}

function draw(item) {
  if (out.width !== W) { out.width = W; out.height = H; }
  octx.drawImage(item.payload, 0, 0, W, H); // mids at compute size upscale here (GPU)
  item.payload.close();
  shown++;
  const now = performance.now();
  shownWindow.push(now);
  while (shownWindow.length && shownWindow[0] < now - 1000) shownWindow.shift();
}

function pump(now) {
  if (!running) return;
  queue.sort((a, b) => a.at - b.at);
  let due = -1;
  for (let i = 0; i < queue.length; i++) if (queue[i].at <= now) due = i;
  if (due >= 0) {
    for (let i = 0; i < due; i++) { dropped++; queue[i].payload.close(); }
    draw(queue[due]);
    queue = queue.slice(due + 1);
  }
  if (now - hudTimer > 250) {
    hudTimer = now;
    $('hud').textContent =
      `out ${shownWindow.length} fps · interp ${interpMs.toFixed(0)} ms` +
      `${halfRate ? ' · ½-rate' : ''} · mids: ${midCfg || '—'}\n` +
      `shown ${shown} · dropped ${dropped} · dups ${dups} · ${workerKey ?? ''}`;
  }
  requestAnimationFrame(pump);
}

async function onFrame() {
  if (!running) return;
  const ts = performance.now();
  // letterbox the frame into the display size and the (possibly smaller) model size —
  // both are GPU draws, no pixel readback on this thread
  const s = Math.min(W / vid.videoWidth, H / vid.videoHeight);
  const dw = vid.videoWidth * s, dh = vid.videoHeight * s;
  lctx.fillStyle = '#000'; lctx.fillRect(0, 0, W, H);
  lctx.drawImage(vid, (W - dw) / 2, (H - dh) / 2, dw, dh);
  lcctx.drawImage(letterbox, 0, 0, CW, CH);
  const [bmpKeep, bmpSend] = await Promise.all([
    createImageBitmap(letterbox), createImageBitmap(letterboxC)]);

  if (prevBmp) {
    const dt = ts - prevTs;
    if (dt > 5 && dt < 500) intervalMs = intervalMs * 0.9 + dt * 0.1;
    queue.push({ payload: prevBmp, at: ts + DELAY_MS });
  }
  prevBmp = bmpKeep; prevTs = ts;
  worker.postMessage({ type: 'frame', bmp: bmpSend, ts }, [bmpSend]);
  vid.requestVideoFrameCallback(onFrame);
}

function onWorkerMessage(ev) {
  const m = ev.data;
  if (m.type === 'mid') {
    interpMs = m.interpMs; halfRate = m.halfRate; midCfg = m.cfg;
    const due = m.ts + DELAY_MS + intervalMs / 2;
    if (performance.now() <= due + intervalMs / 4) {
      createImageBitmap(new ImageData(new Uint8ClampedArray(m.rgba), m.w, m.h))
        .then(bmp => queue.push({ payload: bmp, at: due }));
    } else dropped++;
  } else if (m.type === 'dup') dups++;
  else if (m.type === 'skipped') dropped++;
  else if (m.type === 'log') st(m.msg);
  else if (m.type === 'error') {
    st('WORKER ERROR: ' + m.msg, true);
    // error storm = the wasm runtime is likely poisoned; a fresh worker is the only cure
    errTimes.push(performance.now());
    while (errTimes.length && errTimes[0] < performance.now() - 10000) errTimes.shift();
    if (errTimes.length >= 5 && !restarting) {
      restarting = true;
      st('слишком много ошибок — перезапускаю воркер...');
      workerKey = null;
      ensureWorker().then(() => { errTimes = []; restarting = false; st('воркер перезапущен'); })
        .catch(() => { restarting = false; });
    }
  }
}
let errTimes = [], restarting = false;

function ensureWorker() {
  const ep = $('ep').value, res = $('res').value, q = $('quality').value;
  const key = ep + '/' + res + 'p/' + q;
  if (worker && workerKey === key) return Promise.resolve();
  if (worker) worker.terminate();
  const mode = MODES[res];
  if (res === 'auto') {
    // display at the video's native size (capped at FHD); mids follow the ladder
    const s = Math.min(1, 1920 / (vid.videoWidth || 1280), 1080 / (vid.videoHeight || 720));
    [W, H] = [Math.round((vid.videoWidth || 1280) * s), Math.round((vid.videoHeight || 720) * s)];
    [CW, CH] = [W, H];
  } else {
    [W, H] = mode.disp;
    [CW, CH] = mode.comp;
  }
  letterbox = new OffscreenCanvas(W, H);
  lctx = letterbox.getContext('2d');
  letterboxC = new OffscreenCanvas(CW, CH);
  lcctx = letterboxC.getContext('2d');
  worker = new Worker('player_worker.js?v=4'); // cache-bust: workers are cached aggressively
  worker.onmessage = onWorkerMessage;
  workerKey = key;
  st(`создаю сессию ${key} в воркере... (webnn собирает граф несколько секунд, один раз)`);
  return new Promise((resolve, reject) => {
    const orig = onWorkerMessage;
    worker.onmessage = ev => {
      if (ev.data.type === 'ready') { st('сессия готова (режим ' + ev.data.mode + ')'); worker.onmessage = orig; resolve(); }
      else if (ev.data.type === 'error') { st('WORKER ERROR: ' + ev.data.msg, true); reject(new Error(ev.data.msg)); }
      else orig(ev);
    };
    worker.postMessage({ type: 'init', ep, auto: res === 'auto', res: mode.f32res, quality: q,
      animeMode: $('animeMode').checked, interpOn: $('interpOn').checked });
  });
}

$('animeMode').onchange = $('interpOn').onchange = () => {
  if (worker) worker.postMessage({ type: 'opts',
    animeMode: $('animeMode').checked, interpOn: $('interpOn').checked });
};

$('file').onchange = e => {
  const f = e.target.files[0];
  if (!f) return;
  vid.src = URL.createObjectURL(f);
  vid.onloadeddata = () => {
    st(`видео: ${vid.videoWidth}x${vid.videoHeight}, ${vid.duration.toFixed(1)}с — жми Play`);
    $('playBtn').disabled = false; $('pauseBtn').disabled = false;
  };
  vid.onerror = () => st('видео не декодируется (кодек?)', true);
};

$('playBtn').onclick = async () => {
  try {
    await ensureWorker();
    ensureAudioDelay();
    await audioCtx.resume();
    audioDelay.delayTime.value = DELAY_MS / 1000;
    vid.muted = $('mute').checked;
    prevBmp = null; queue = []; running = true;
    hudTimer = 0; shownWindow = [];
    await vid.play();
    vid.requestVideoFrameCallback(onFrame);
    requestAnimationFrame(pump);
  } catch (e) { st('ERROR: ' + (e.stack || e.message || e), true); }
};
$('pauseBtn').onclick = () => { vid.pause(); running = false; };
$('mute').onchange = () => { vid.muted = $('mute').checked; };
vid.onended = () => { running = false; st('конец видео'); };
</script>
</body>
</html>
