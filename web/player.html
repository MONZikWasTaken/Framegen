<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Framecast - real-time 2× player</title>
<style>
  body { font:14px/1.5 system-ui, sans-serif; margin:20px; max-width:1100px; background:#181818; color:#ddd; }
  button,select { font-size:15px; padding:5px 10px; margin-right:8px; }
  #stage { position:relative; margin-top:12px; max-width:1024px; }
  canvas { width:100%; background:#000; display:block; border-radius:6px; }
  #hud { position:absolute; top:8px; left:8px; font:13px/1.5 monospace; color:#0f0;
         background:rgba(0,0,0,.55); padding:6px 10px; border-radius:6px; white-space:pre; }
  #stage:fullscreen { background:#000; display:flex; align-items:center; }
  #stage:fullscreen canvas { width:100%; height:100%; object-fit:contain; }
  #status { font:13px monospace; white-space:pre-wrap; color:#aaa; margin-top:8px; }
  .bad { color:#f66; }
  label { margin-right:12px; }
</style>
</head>
<body>
<h3>Framecast - real-time 2× player (worker edition)</h3>
<p>Fully GPU-resident pipeline on our own WebGPU runtime: video → texture →
interpolation (2-6×) → SR upscale → screen. No browser flags needed.</p>

<div>
  <input type="file" id="file" accept="video/*">
  <select id="res"><option value="auto">auto (max quality+fps)</option><option value="1080">1080p (mids at 480p)</option><option value="720">720p (mids at 480p)</option><option value="480">480p</option><option value="360">360p</option><option value="720f">720p honest (slow)</option></select>
  <select id="factor"><option value="6">auto (max smoothness)</option><option value="2">2×</option><option value="3">3×</option><option value="4">4×</option><option value="5">5×</option></select>
</div>
<div style="margin-top:8px">
  <button id="playBtn" disabled>Play</button>
  <button id="pauseBtn" disabled>Pause</button>
  <label><input type="checkbox" id="interpOn" checked> interpolation</label>
  <label><input type="checkbox" id="animeMode" checked> anime mode (dedup twos)</label>
  <label><input type="checkbox" id="srOn"> SR 2× (anime upscale)</label>
  <label><input type="checkbox" id="mute"> mute</label>
</div>

<div id="stage"><canvas id="out"></canvas><div id="hud">-</div></div>
<div id="bar" style="margin-top:6px; max-width:1024px; display:flex; align-items:center; gap:10px;">
  <button id="fsBtn" title="fullscreen (or double-click)">⛶</button>
  <span id="clock" style="font:13px monospace; min-width:110px;">0:00 / 0:00</span>
  <input type="range" id="seek" min="0" max="1000" value="0" style="flex:1;">
</div>
<div id="status"></div>
<video id="vid" style="display:none" playsinline></video>

<script>
// disp = display/original size; res = the worker's model rung for the mids.
// '720' shows sharp 720p originals but computes mids at 480p (upscaled on display) -
// a mid flashes for ~21ms between two sharp frames, the softness is invisible, and the
// 480p model fits the real-time budget where the honest 720p one does not.
const MODES = {
  'auto': { disp: null,         res: '480' }, // disp = video native (<=1080), worker walks the ladder
  '1080': { disp: [1920, 1080], res: '480' },
  '360':  { disp: [640, 360],  res: '360' },
  '480':  { disp: [854, 480],  res: '480' },
  '720':  { disp: [1280, 720], res: '480' },
  '720f': { disp: [1280, 720], res: '720' },
};
const DELAY_MS = 100; // pipeline delay (display queue + audio DelayNode)

const $ = id => document.getElementById(id);
const st = (m, bad) => { $('status').textContent += m + '\n'; if (bad) $('status').classList.add('bad'); };
const vid = $('vid');
let out = $('out'); // canvas is replaced per worker (transferControlToOffscreen is one-shot)

// presentation is ALWAYS worker-side (the worker refuses to init without an
// OffscreenCanvas) - the old main-thread present path is gone
let worker = null, workerKey = null;
let W = 0, H = 0;     // display size
let letterbox = null, lctx = null;   // display-size staging canvas (GPU draws only)
let running = false;

let audioCtx = null, audioDelay = null;
function ensureAudioDelay() {
  if (audioCtx) return;
  audioCtx = new AudioContext();
  audioCtx.createMediaElementSource(vid).connect(
    (audioDelay = audioCtx.createDelay(1.0))).connect(audioCtx.destination);
}

async function onFrame() {
  if (!running) return;
  const ts = performance.now();
  // letterbox the frame - a GPU draw, no pixel readback on this thread
  const s = Math.min(W / vid.videoWidth, H / vid.videoHeight);
  const dw = vid.videoWidth * s, dh = vid.videoHeight * s;
  lctx.fillStyle = '#000'; lctx.fillRect(0, 0, W, H);
  lctx.drawImage(vid, (W - dw) / 2, (H - dh) / 2, dw, dh);
  // the worker presents everything: one bitmap is all it needs
  const bmp = await createImageBitmap(letterbox);
  worker.postMessage({ type: 'frame', bmp, ts }, [bmp]);
  vid.requestVideoFrameCallback(onFrame);
}

function onWorkerMessage(ev) {
  const m = ev.data;
  if (m.type === 'stats') {
    // worker-present mode: the worker owns the display; we just render its HUD
    $('hud').textContent =
      `out ${m.fps} fps · interp ${m.interpMs.toFixed(0)} ms` +
      `${m.halfRate ? ' · ½-rate' : ''} · mids: ${m.cfg || '-'}\n` +
      `shown ${m.shown} · dropped ${m.dropped} · dups ${m.dups} · cuts ${m.cuts} · ${workerKey ?? ''}`;
  } else if (m.type === 'tune') {
    const all = JSON.parse(localStorage.getItem('framecastTune') || '{}');
    all[m.res] = m.tune;
    localStorage.setItem('framecastTune', JSON.stringify(all));
  } else if (m.type === 'log') st(m.msg);
  else if (m.type === 'error') {
    st('WORKER ERROR: ' + m.msg, true);
    // error storm = the wasm runtime is likely poisoned; a fresh worker is the only cure
    errTimes.push(performance.now());
    while (errTimes.length && errTimes[0] < performance.now() - 10000) errTimes.shift();
    if (errTimes.length >= 5 && !restarting) {
      restarting = true;
      st('too many errors - restarting the worker...');
      workerKey = null;
      ensureWorker().then(() => { errTimes = []; restarting = false; st('worker restarted'); })
        .catch(() => { restarting = false; });
    }
  }
}
let errTimes = [], restarting = false;

function ensureWorker() {
  // our own runtime, WebGPU only - the ort-web fallback (and its quality tiers) is gone
  const res = $('res').value;
  const key = res + 'p' + ($('srOn').checked ? '/sr' : '');
  if (worker && workerKey === key) return Promise.resolve();
  if (worker) worker.terminate();
  const mode = MODES[res];
  if (res === 'auto') {
    // display at the video's native size (capped at FHD); mids follow the ladder
    const s = Math.min(1, 1920 / (vid.videoWidth || 1280), 1080 / (vid.videoHeight || 720));
    [W, H] = [Math.round((vid.videoWidth || 1280) * s), Math.round((vid.videoHeight || 720) * s)];
  } else {
    [W, H] = mode.disp;
  }
  letterbox = new OffscreenCanvas(W, H);
  lctx = letterbox.getContext('2d');
  // transferControlToOffscreen is one-shot per element - every worker gets a fresh canvas
  const freshOut = out.cloneNode(false);
  out.replaceWith(freshOut);
  out = freshOut;
  const offscreen = out.transferControlToOffscreen();
  worker = new Worker('player_worker.js?v=24', { type: 'module' }); // cache-bust: workers are cached aggressively
  worker.onmessage = onWorkerMessage;
  workerKey = key;
  st(`creating session ${key} in the worker... (first run builds pipelines for a few seconds)`);
  return new Promise((resolve, reject) => {
    const orig = onWorkerMessage;
    worker.onmessage = ev => {
      if (ev.data.type === 'ready') {
        st('session ready (mode ' + ev.data.mode + ')');
        worker.onmessage = orig;
        resolve();
      }
      else if (ev.data.type === 'error') { st('WORKER ERROR: ' + ev.data.msg, true); reject(new Error(ev.data.msg)); }
      else orig(ev);
    };
    worker.postMessage({ type: 'init', auto: res === 'auto', res: mode.res,
      animeMode: $('animeMode').checked, interpOn: $('interpOn').checked, sr: $('srOn').checked,
      factor: +$('factor').value, dispW: W, dispH: H, canvas: offscreen,
      tunes: JSON.parse(localStorage.getItem('framecastTune') || '{}') }, [offscreen]);
  });
}

$('animeMode').onchange = $('interpOn').onchange = $('factor').onchange = () => {
  if (worker) worker.postMessage({ type: 'opts',
    animeMode: $('animeMode').checked, interpOn: $('interpOn').checked,
    factor: +$('factor').value });
};

$('file').onchange = e => {
  const f = e.target.files[0];
  if (!f) return;
  vid.src = URL.createObjectURL(f);
  vid.onloadeddata = () => {
    st(`video: ${vid.videoWidth}x${vid.videoHeight}, ${vid.duration.toFixed(1)}s - press Play`);
    $('playBtn').disabled = false; $('pauseBtn').disabled = false;
  };
  vid.onerror = () => st('video does not decode (codec?)', true);
};

// ---- player controls: seek/clock/fullscreen/drag&drop/space/persisted settings ----
const fmt = s => `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, '0')}`;
let seeking = false;
setInterval(() => {
  if (!vid.duration) return;
  $('clock').textContent = `${fmt(vid.currentTime)} / ${fmt(vid.duration)}`;
  if (!seeking) $('seek').value = Math.round(vid.currentTime / vid.duration * 1000);
}, 250);
$('seek').oninput = () => { seeking = true; };
$('seek').onchange = () => {
  if (vid.duration) {
    vid.currentTime = +$('seek').value / 1000 * vid.duration;
    if (worker) worker.postMessage({ type: 'flush' }); // a mid across the seek is garbage
  }
  seeking = false;
};
function togglePlay() {
  if (!vid.src) return;
  if (vid.paused) $('playBtn').click(); else $('pauseBtn').click();
}
$('stage').onclick = togglePlay; // stage, not canvas - the canvas node is replaced per worker
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && e.target.tagName !== 'INPUT') { e.preventDefault(); togglePlay(); }
});
$('fsBtn').onclick = () => document.fullscreenElement
  ? document.exitFullscreen() : $('stage').requestFullscreen();
$('stage').ondblclick = $('fsBtn').onclick;
$('stage').ondragover = e => e.preventDefault();
$('stage').ondrop = e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f) { $('file').files = e.dataTransfer.files; $('file').onchange({ target: { files: [f] } }); }
};
// settings persist across sessions
const SETTINGS = ['res', 'factor'];
const FLAGS = ['interpOn', 'animeMode', 'mute', 'srOn'];
try {
  const saved = JSON.parse(localStorage.getItem('framecast') || '{}');
  SETTINGS.forEach(k => { if (saved[k]) $(k).value = saved[k]; });
  FLAGS.forEach(k => { if (k in saved) $(k).checked = saved[k]; });
} catch {}
function saveSettings() {
  const s = {};
  SETTINGS.forEach(k => s[k] = $(k).value);
  FLAGS.forEach(k => s[k] = $(k).checked);
  localStorage.setItem('framecast', JSON.stringify(s));
}
[...SETTINGS, ...FLAGS].forEach(k => $(k).addEventListener('change', saveSettings));

$('playBtn').onclick = async () => {
  try {
    await ensureWorker();
    ensureAudioDelay();
    await audioCtx.resume();
    audioDelay.delayTime.value = DELAY_MS / 1000;
    vid.muted = $('mute').checked;
    running = true;
    await vid.play();
    vid.requestVideoFrameCallback(onFrame);
  } catch (e) { st('ERROR: ' + (e.stack || e.message || e), true); }
};
$('pauseBtn').onclick = () => { vid.pause(); running = false; };
$('mute').onchange = () => { vid.muted = $('mute').checked; };
vid.onended = () => { running = false; st('end of video'); };
</script>
</body>
</html>
