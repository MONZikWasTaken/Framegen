<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Framecast — 2× slow-mo</title>
<style>
  body { font:14px/1.5 system-ui, sans-serif; margin:20px; max-width:1000px; }
  button,select,input[type=number] { font-size:15px; padding:5px 10px; margin-right:8px; }
  #status { font:13px monospace; white-space:pre-wrap; color:#333; margin-top:8px; }
  canvas { max-width:720px; height:auto; background:#111; display:block; margin-top:10px; }
  .bad { color:#c00; }
  label { margin-right:12px; }
</style>
</head>
<body>
<h3>Framecast — 2× slow-motion (precompute + play)</h3>
<p>Loads a short clip, interpolates a middle frame between each pair, and plays the doubled
sequence at the original fps → smooth 2× slow-mo. Not real-time (precompute-then-play).</p>

<div>
  <select id="ep"><option value="webgpu">webgpu</option><option value="webnn">webnn (DirectML, ~3.5×; needs flag)</option><option value="wasm">wasm</option></select>
  <select id="res"><option value="720">720p</option><option value="480">480p (~2× faster)</option><option value="360">360p (~3× faster)</option></select>
  <select id="quality"><option value="full">quality: full</option><option value="fast">fast (−refine, ~1.5×)</option><option value="fastest">fastest (student, ~4×)</option><option value="turbo">turbo (1blk student, ~9×)</option></select>
  <label>frames <input type="number" id="nFrames" value="8" min="2" max="48" style="width:56px"></label>
  <label>fps <input type="number" id="fps" value="24" min="1" max="60" style="width:56px"></label>
  <input type="file" id="file" accept="video/*">
  <button id="demoBtn">Use demo clip</button>
  <button id="computeBtn">Compute</button>
</div>
<div>
  <button id="playBtn" disabled>Play</button>
  <button id="pauseBtn" disabled>Pause</button>
  <label><input type="checkbox" id="interp" checked> interpolated (2×)</label>
  <label><input type="checkbox" id="loop" checked> loop</label>
</div>
<div id="status"></div>
<video id="vid" preload="auto" muted playsinline style="display:none"></video>
<canvas id="out" width="640" height="360"></canvas>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.all.min.js"></script>
<script type="module">
import { createSession, interpolate } from './rife_session.js';
import { assembleSlowmo } from './slowmo.js';

const $ = id => document.getElementById(id);
const st = (m, bad) => { $('status').textContent += m + '\n'; if (bad) $('status').classList.add('bad'); };
const vid = $('vid'), out = $('out'), octx = out.getContext('2d');

let frames = [];   // sampled ImageData (fit to selected engine size)
let seq = [];      // assembled ImageData sequence to play
let handle = null, sessKey = null;

function loadVideo(src) {
  return new Promise((res, rej) => {
    vid.onloadeddata = () => res();
    vid.onerror = () => rej(new Error('video load/decode failed (codec unsupported?)'));
    vid.src = src;
  });
}
function seekTo(t) {
  return new Promise((res) => { vid.onseeked = () => res(); vid.currentTime = t; });
}
function grabFrame(maxw, maxh) {
  const s = Math.min(1, maxw / vid.videoWidth, maxh / vid.videoHeight);
  const w = Math.max(1, Math.round(vid.videoWidth * s)), h = Math.max(1, Math.round(vid.videoHeight * s));
  const off = new OffscreenCanvas(w, h), o = off.getContext('2d');
  o.drawImage(vid, 0, 0, w, h);
  return o.getImageData(0, 0, w, h);
}

async function sampleFrames(n, fps, maxw, maxh) {
  const got = [];
  for (let i = 0; i < n; i++) {
    await seekTo(i / fps);
    got.push(grabFrame(maxw, maxh));
    st(`sampled frame ${i + 1}/${n}`);
  }
  return got;
}

async function ensureSession(ep, res, quality) {
  const key = ep + '/' + res + '/' + quality;
  if (handle && sessKey === key) return handle;
  st('creating session on ' + ep + ' @ ' + res + 'p/' + quality + ' ...');
  handle = await createSession(ep, res, quality); sessKey = key;
  st('session ready');
  return handle;
}

$('file').onchange = async e => {
  try { await loadVideo(URL.createObjectURL(e.target.files[0])); st('video loaded ' + vid.videoWidth + 'x' + vid.videoHeight); }
  catch (err) { st('ERROR: ' + err.message, true); }
};
$('demoBtn').onclick = async () => {
  try { await loadVideo('/demo/test_720p.mp4'); st('demo clip loaded ' + vid.videoWidth + 'x' + vid.videoHeight); }
  catch (err) { st('ERROR: ' + err.message, true); }
};

$('computeBtn').onclick = async () => {
  try {
    if (!vid.videoWidth) { st('load a clip first', true); return; }
    const ep = $('ep').value, res = $('res').value, quality = $('quality').value;
    const n = +$('nFrames').value, fps = +$('fps').value;
    const s = await ensureSession(ep, res, quality);
    frames = await sampleFrames(n, fps, s.maxw, s.maxh);
    const mids = [];
    const t0 = performance.now();
    for (let i = 0; i < frames.length - 1; i++) {
      st(`computing ${i + 1}/${frames.length - 1} ...`);
      mids.push(await interpolate(s, frames[i], frames[i + 1]));
    }
    const dt = performance.now() - t0;
    seq = assembleSlowmo(frames, mids);
    st(`done: ${frames.length} frames -> sequence ${seq.length} (2x), ${(dt / Math.max(1, mids.length)).toFixed(0)} ms/interp · ${ep} @ ${res}p/${quality}`);
    $('playBtn').disabled = false; $('pauseBtn').disabled = false;
    draw(0); startPlayback();
  } catch (err) { st('ERROR: ' + (err.stack || err.message || err), true); }
};

function draw(i) {
  const src = $('interp').checked ? seq : frames;
  if (!src.length) return;
  const f = src[i % src.length];
  out.width = f.width; out.height = f.height;
  octx.putImageData(f, 0, 0);
}

let raf = null, idx = 0, lastT = 0;
function startPlayback() {
  cancelAnimationFrame(raf); idx = 0; lastT = 0;
  const step = (ts) => {
    const src = $('interp').checked ? seq : frames;
    const interval = 1000 / (+$('fps').value);
    if (!lastT) lastT = ts;
    if (ts - lastT >= interval) {
      lastT = ts; idx++;
      if (idx >= src.length) { if ($('loop').checked) idx = 0; else { draw(src.length - 1); return; } }
      draw(idx);
    }
    raf = requestAnimationFrame(step);
  };
  raf = requestAnimationFrame(step);
}
$('playBtn').onclick = () => startPlayback();
$('pauseBtn').onclick = () => cancelAnimationFrame(raf);
</script>
</body>
</html>
