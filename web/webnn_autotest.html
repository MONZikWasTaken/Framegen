<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Framecast — WebNN auto-test</title>
<style>body{font:15px/1.6 monospace;margin:24px}</style></head>
<body>
<h3>WebNN auto-test — не закрывай окно, всё само</h3>
<div id="log">starting...</div>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.all.min.js"></script>
<script>
const el = document.getElementById('log');
const say = m => { el.innerHTML += '<br>' + m; };
const results = {};

const CASES = [
  ['480p_student',  '/assets/rife_lite_480p_2blk_noref_student.onnx', 480, 864],
  ['360p_student',  '/assets/rife_lite_360p_2blk_noref_student.onnx', 384, 640],
  ['720p_student',  '/assets/rife_lite_720p_2blk_noref_student.onnx', 736, 1280],
  ['480p_full',     '/assets/rife_lite_480x854.onnx',                 480, 864],
];

async function bench(name, url, h, w) {
  const sess = await ort.InferenceSession.create(url, {
    executionProviders: [{ name: 'webnn', deviceType: 'gpu', powerPreference: 'high-performance' }],
    graphOptimizationLevel: 'all',
  });
  const n = 3 * h * w;
  const a = new Float32Array(n).fill(0.5), b = new Float32Array(n).fill(0.5);
  const feeds = {};
  feeds[sess.inputNames[0]] = new ort.Tensor('float32', a, [1, 3, h, w]);
  feeds[sess.inputNames[1]] = new ort.Tensor('float32', b, [1, 3, h, w]);
  let out = await sess.run(feeds); // warmup (webnn build is slow, one-time)
  const ts = [];
  for (let i = 0; i < 10; i++) { const t = performance.now(); out = await sess.run(feeds); ts.push(performance.now() - t); }
  ts.sort((x, y) => x - y);
  const od = out[sess.outputNames[0]].data;
  let mn = 1e9, mx = -1e9;
  for (let i = 0; i < od.length; i += 997) { const v = od[i]; if (v < mn) mn = v; if (v > mx) mx = v; }
  await sess.release();
  return { p50: +ts[5].toFixed(1), p10: +ts[1].toFixed(1), fps: +(1000 / ts[5]).toFixed(1),
           out_ok: !(mn === 0 && mx === 0) };
}

(async () => {
  results.ml = !!navigator.ml;
  say('navigator.ml = ' + results.ml);
  if (results.ml) {
    for (const [name, url, h, w] of CASES) {
      say(name + ': building session (первый раз ~секунды)...');
      try {
        results[name] = await bench(name, url, h, w);
        say(`${name}: p50=${results[name].p50}ms fps=${results[name].fps} out_ok=${results[name].out_ok}`);
      } catch (e) { results[name] = { error: String(e).slice(0, 300) }; say(name + ' FAILED: ' + e); }
    }
  }
  say('POSTing results...');
  await fetch('/result', { method: 'POST', headers: { 'Content-Type': 'application/json' },
                           body: JSON.stringify(results) });
  say('<b>DONE — можно закрыть окно</b>');
})();
</script>
</body>
</html>
